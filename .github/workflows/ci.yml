name: CI — Lint, Syntax Check & Docker Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Python syntax & import checks
  # ─────────────────────────────────────────────
  lint:
    name: Python Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install pyflakes==3.2.0 ruff==0.4.4

      - name: Syntax check — edge
        run: python -m py_compile edge/models.py edge/edge_infer.py edge/edge_api.py edge/offload_manager.py edge/logger.py edge/run_cloud_only.py edge/run_edge_only.py edge/run_edge_cloud.py edge/metrics.py

      - name: Syntax check — cloud
        run: python -m py_compile cloud/cloud_api.py

      - name: Syntax check — dashboard
        run: python -m py_compile dashboard/app.py

      - name: Ruff lint — edge
        run: ruff check edge/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Ruff lint — cloud
        run: ruff check cloud/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Ruff lint — dashboard
        run: ruff check dashboard/ --select E,W,F --ignore E501
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 2: Build Docker images
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cloud_node image
        uses: docker/build-push-action@v5
        with:
          context: ./cloud
          push: false
          tags: edge-cloud/cloud_node:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build edge_node image
        uses: docker/build-push-action@v5
        with:
          context: ./edge
          push: false
          tags: edge-cloud/edge_node:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: edge-cloud/dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Smoke test — cloud API health check
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test — Cloud API
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start cloud_node
        run: |
          docker compose up -d cloud_node
          echo "Waiting for cloud_node to become healthy..."

      - name: Wait for cloud_node health
        run: |
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' cloud_node 2>/dev/null || echo "starting")
            echo "Attempt $i/24 — status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "cloud_node is healthy"
              exit 0
            fi
            sleep 15
          done
          echo "cloud_node did not become healthy in time"
          docker logs cloud_node
          exit 1

      - name: Test GET /health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Expected healthy, got: {data}'
          assert data['model_loaded'] == True, f'Model not loaded: {data}'
          print('Health check passed')
          "

      - name: Test POST /predict with sample image
        run: |
          # Create a minimal valid JPEG (1x1 white pixel)
          python3 -c "
