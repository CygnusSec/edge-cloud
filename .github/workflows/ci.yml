name: CI/CD — Edge-Cloud Demo

on:
  push:
    branches: [main, develop]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Python syntax & lint check
  # ─────────────────────────────────────────────
  lint:
    name: Python Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install pyflakes==3.2.0 ruff==0.4.4

      - name: Syntax check — edge
        run: |
          python -m py_compile edge/models.py
          python -m py_compile edge/edge_infer.py
          python -m py_compile edge/edge_api.py
          python -m py_compile edge/offload_manager.py
          python -m py_compile edge/logger.py
          python -m py_compile edge/run_cloud_only.py
          python -m py_compile edge/run_edge_only.py
          python -m py_compile edge/run_edge_cloud.py
          python -m py_compile edge/metrics.py

      - name: Syntax check — cloud & dashboard
        run: |
          python -m py_compile cloud/cloud_api.py
          python -m py_compile dashboard/app.py

      - name: Ruff lint
        run: ruff check edge/ cloud/ dashboard/ --select E,W,F --ignore E501
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker images to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: cloud-node
            context: ./cloud
          - service: edge-node
            context: ./edge
          - service: dashboard
            context: ./dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "TAG=latest" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "TAG=main" >> $GITHUB_ENV
          else
            echo "TAG=pr-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Build
        run: |
          docker build \
            -t ghcr.io/cygnussec/${{ matrix.service }}:${TAG} \
            ${{ matrix.context }}

      - name: Push
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/cygnussec/${{ matrix.service }}:${TAG}

  # ─────────────────────────────────────────────
  # Job 3: Smoke test — Cloud API health check
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test — Cloud API
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "TAG=latest" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "TAG=main" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and start cloud_node
        run: |
          docker run -d \
            --name cloud_node \
            -p 8000:8000 \
            ghcr.io/cygnussec/cloud-node:${TAG}

      - name: Wait for cloud_node to be healthy
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -sf http://localhost:8000/health 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            echo "Attempt $i/24 — status: ${STATUS}"
            if [ "$STATUS" = "healthy" ]; then
              echo "cloud_node is healthy"
              exit 0
            fi
            sleep 15
          done
          echo "cloud_node did not become healthy in time"
          docker logs cloud_node
          exit 1

      - name: Test GET /health
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'healthy', f'Expected healthy: {d}'
          assert d['model_loaded'] == True, f'Model not loaded: {d}'
          print('Health check passed')
          "

      - name: Test POST /predict
        run: |
          python3 -c "
          jpeg = bytes([
            0xFF,0xD8,0xFF,0xE0,0x00,0x10,0x4A,0x46,0x49,0x46,0x00,0x01,
            0x01,0x00,0x00,0x01,0x00,0x01,0x00,0x00,0xFF,0xDB,0x00,0x43,
            0x00,0x08,0x06,0x06,0x07,0x06,0x05,0x08,0x07,0x07,0x07,0x09,
            0x09,0x08,0x0A,0x0C,0x14,0x0D,0x0C,0x0B,0x0B,0x0C,0x19,0x12,
            0x13,0x0F,0x14,0x1D,0x1A,0x1F,0x1E,0x1D,0x1A,0x1C,0x1C,0x20,
            0x24,0x2E,0x27,0x20,0x22,0x2C,0x23,0x1C,0x1C,0x28,0x37,0x29,
            0x2C,0x30,0x31,0x34,0x34,0x34,0x1F,0x27,0x39,0x3D,0x38,0x32,
            0x3C,0x2E,0x33,0x34,0x32,0xFF,0xC0,0x00,0x0B,0x08,0x00,0x01,
            0x00,0x01,0x01,0x01,0x11,0x00,0xFF,0xC4,0x00,0x1F,0x00,0x00,
            0x01,0x05,0x01,0x01,0x01,0x01,0x01,0x01,0x00,0x00,0x00,0x00,
            0x00,0x00,0x00,0x00,0x01,0x02,0x03,0x04,0x05,0x06,0x07,0x08,
            0x09,0x0A,0x0B,0xFF,0xDA,0x00,0x08,0x01,0x01,0x00,0x00,0x3F,
            0x00,0xFB,0xD2,0x8A,0x28,0x03,0xFF,0xD9
          ])
          with open('/tmp/test.jpg', 'wb') as f:
              f.write(jpeg)
          "
          RESPONSE=$(curl -sf -X POST http://localhost:8000/predict \
            -F "file=@/tmp/test.jpg;type=image/jpeg")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'objects' in d
          assert 'confidence' in d
          assert 'object_count' in d
          assert 'latency_ms' in d
          assert d['latency_ms'] > 0
          print(f'Predict passed — {d[\"object_count\"]} objects, latency {d[\"latency_ms\"]:.1f}ms')
          "

      - name: Tear down
        if: always()
        run: docker rm -f cloud_node || true
