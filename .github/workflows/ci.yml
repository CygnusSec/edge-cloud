          RESPONSE=$(curl -sf -X POST http://localhost:8000/predict \
            -F "file=@/tmp/test.jpg;type=image/jpeg")
          echo "Predict response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'objects' in data, f'Missing objects: {data}'
          assert 'confidence' in data, f'Missing confidence: {data}'
          assert 'object_count' in data, f'Missing object_count: {data}'
          assert 'latency_ms' in data, f'Missing latency_ms: {data}'
          assert data['latency_ms'] > 0, f'latency_ms should be > 0: {data}'
          print(f'Predict check passed — {data[\"object_count\"]} objects detected')
          "

      - name: Tear down
        if: always()
        run: docker compose down
